<head>
<meta charset="UTF-8">

<title>ANIME UNIVERSE — 100 Essential Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+JP:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04040e;
  --bg2: #0a0a1c;
  --card: #0f0f22;
  --card2: #161630;
  --border: rgba(255,255,255,0.06);
  --pink: #ff2d78;
  --cyan: #00d4ff;
  --gold: #ffd060;
  --purple: #9b5cf6;
  --text: #e8e8f5;
  --muted: #5a5a80;
  --tag-bg: rgba(255,255,255,0.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background:var(--bg); color:var(--text); font-family:'Noto Serif JP',serif; overflow-x:hidden; }

/* HERO */
.hero {
  position:relative; height:380px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden;
}
.hero::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),transparent);
}
.hero-glow {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,0.15), transparent 70%),
    radial-gradient(ellipse 40% 40% at 85% 90%, rgba(255,45,120,0.12), transparent 60%),
    radial-gradient(ellipse 40% 40% at 15% 90%, rgba(155,92,246,0.1), transparent 60%);
}
.hero-kanji {
  position:absolute; font-size:320px; font-family:'Noto Serif JP',serif; font-weight:700;
  color:rgba(255,255,255,0.018); top:-60px; left:50%; transform:translateX(-50%);
  white-space:nowrap; pointer-events:none; letter-spacing:-30px; z-index:0;
}
.hero-content { position:relative; z-index:1; text-align:center; }
.hero h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,12vw,108px);
  letter-spacing:14px;
  background:linear-gradient(135deg,#ffffff 20%,var(--cyan) 55%,var(--pink) 85%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1;
}
.hero-tagline {
  font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:5px;
  color:var(--muted); margin-top:10px; text-transform:uppercase;
}
.hero-stats {
  display:flex; gap:48px; margin-top:28px; justify-content:center;
}
.stat { text-align:center; }
.stat-num { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--cyan); display:block; line-height:1; }
.stat-label { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-top:3px; display:block; }
.hero-line {
  position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--cyan) 30%,var(--pink) 70%,transparent 100%);
  opacity:0.4;
}

/* CONTROLS */
.controls {
  position:sticky; top:0; z-index:200;
  background:rgba(4,4,14,0.94); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:14px 28px;
  display:flex; gap:14px; align-items:center; flex-wrap:wrap;
}
.search-wrap { position:relative; flex:1; min-width:200px; max-width:320px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:15px; }
.search-wrap input {
  width:100%; background:var(--card2); border:1px solid var(--border);
  border-radius:8px; padding:9px 14px 9px 38px; color:var(--text);
  font-family:'JetBrains Mono',monospace; font-size:13px; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,212,255,0.1); }
.search-wrap input::placeholder { color:var(--muted); }
.filters { display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn {
  padding:6px 15px; border-radius:100px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:10px; cursor:pointer; transition:all 0.2s; letter-spacing:1px; text-transform:uppercase;
}
.filter-btn:hover { border-color:rgba(0,212,255,0.5); color:var(--cyan); }
.filter-btn.active { background:var(--cyan); border-color:var(--cyan); color:#000; font-weight:700; }

/* RESULTS BAR */
.results-bar {
  padding:20px 28px 8px; font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--muted); max-width:1700px; margin:0 auto;
  display:flex; align-items:center; gap:8px;
}
.results-bar .count { color:var(--cyan); font-weight:700; font-size:13px; }
.load-status { margin-left:auto; display:flex; align-items:center; gap:8px; }
.load-dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:0.3; transform:scale(0.8)} 50%{opacity:1; transform:scale(1)} }

/* GRID */
.grid-container { padding:12px 28px 48px; max-width:1700px; margin:0 auto; }
.anime-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(186px,1fr));
  gap:18px;
}

/* CARD */
.anime-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; overflow:hidden; cursor:pointer;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s, border-color 0.3s;
  position:relative;
  animation:cardIn 0.5s ease forwards;
  opacity:0;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(20px) scale(0.97); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
.anime-card:hover {
  transform:translateY(-8px) scale(1.025);
  box-shadow:0 24px 70px rgba(0,0,0,0.6), 0 0 0 1px var(--cyan), 0 0 40px rgba(0,212,255,0.12);
  border-color:var(--cyan);
  z-index:20;
}
.anime-card.hidden { display:none; }

/* CARD IMAGE */
.card-img-wrap {
  position:relative; aspect-ratio:2/3;
  background:var(--card2); overflow:hidden;
}
.card-img-wrap img {
  width:100%; height:100%; object-fit:cover;
  transition:transform 0.4s ease; display:block;
  opacity:0; transition:opacity 0.4s ease, transform 0.4s ease;
}
.card-img-wrap img.loaded { opacity:1; }
.anime-card:hover .card-img-wrap img { transform:scale(1.06); }
.img-placeholder {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:8px;
}
.img-placeholder-letter {
  font-family:'Bebas Neue',sans-serif; font-size:52px; color:rgba(255,255,255,0.06);
  line-height:1; text-align:center; padding:0 10px;
}
.img-loading-ring {
  width:28px; height:28px; border:2px solid rgba(0,212,255,0.15);
  border-top-color:var(--cyan); border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.img-error-icon { font-size:28px; color:var(--muted); }

/* CARD BADGE */
.card-rank {
  position:absolute; top:8px; left:8px; z-index:3;
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
  color:#000; background:var(--cyan); padding:2px 7px; border-radius:4px;
  line-height:1.4;
}
.card-rank.gold { background:var(--gold); }
.card-rank.pink { background:var(--pink); color:#fff; }

/* CARD BODY */
.card-body { padding:11px 13px 13px; }
.card-title {
  font-size:12.5px; font-weight:700; color:var(--text);
  margin-bottom:8px; line-height:1.45;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.card-tags { display:flex; flex-wrap:wrap; gap:4px; }
.tag {
  font-family:'JetBrains Mono',monospace; font-size:8.5px;
  padding:2px 7px; border-radius:100px;
  background:var(--tag-bg); color:var(--muted);
  border:1px solid var(--border); letter-spacing:0.3px;
}
.tag.action   { border-color:rgba(255,45,120,0.35); color:#ff7eaa; }
.tag.romance  { border-color:rgba(255,180,220,0.35); color:#ffb3d1; }
.tag.comedy   { border-color:rgba(255,208,96,0.35);  color:#ffd060; }
.tag.scifi    { border-color:rgba(0,212,255,0.35);   color:#00d4ff; }
.tag.fantasy  { border-color:rgba(155,92,246,0.35);  color:#c084fc; }
.tag.sports   { border-color:rgba(100,220,130,0.35); color:#86efac; }
.tag.dark     { border-color:rgba(248,113,113,0.35); color:#f87171; }
.tag.isekai   { border-color:rgba(251,146,60,0.35);  color:#fb923c; }
.tag.thriller { border-color:rgba(192,132,252,0.35); color:#c084fc; }
.tag.drama    { border-color:rgba(148,163,184,0.35); color:#94a3b8; }
.tag.mecha    { border-color:rgba(100,200,255,0.35); color:#7dd3fc; }
.tag.horror   { border-color:rgba(220,50,50,0.35);   color:#fc8181; }
.tag.slice    { border-color:rgba(160,210,160,0.35); color:#a7f3d0; }
.tag.music    { border-color:rgba(250,170,220,0.35); color:#f9a8d4; }
.tag.mystery  { border-color:rgba(190,140,255,0.35); color:#d8b4fe; }
.tag.movie    { border-color:rgba(250,204,21,0.35);  color:#fde047; }

/* FOOTER */
footer {
  text-align:center; padding:48px 24px;
  border-top:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:10px;
  color:var(--muted); letter-spacing:2.5px;
}
footer .glow { color:var(--cyan); }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:#1e1e40; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--cyan); }

/* Responsive */
@media (max-width:600px) {
  .hero h1 { letter-spacing:6px; }
  .hero-stats { gap:24px; }
  .controls { padding:12px 16px; }
  .grid-container { padding:10px 14px 40px; }
  .anime-grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
}
</style>

// Deduplicate IDs issue: fix Blue Lock (use search only), fix Soul Eater, Tokyo Ghoul, etc.
const FIXED_QUERIES = {
  10: {q:"Fairy Tail anime 2009"},
  53: {q:"Blue Lock anime 2022"},  // index 53 = Blue Lock
  60: {q:"Tokyo Ghoul anime 2014"},
  65: {q:"Soul Eater anime 2008"},
  91: {q:"Spirited Away Ghibli 2001"},
  95: {q:"Howl Moving Castle Ghibli 2004"},
  99: {q:"Paprika Satoshi Kon 2006"},
};

// Rate-limit queue
const imgQueue = [];
let imgQueueRunning = false;
let loadedCount = 0;
const RATE_MS = 370;

function enqueue(fn) {
  imgQueue.push(fn);
  if (!imgQueueRunning) runQueue();
}

async function runQueue() {
  imgQueueRunning = true;
  while (imgQueue.length > 0) {
    const fn = imgQueue.shift();
    try { await fn(); } catch(e) {}
    await new Promise(r => setTimeout(r, RATE_MS));
  }
  imgQueueRunning = false;
  document.getElementById('loadStatus').style.display = 'none';
}

async function fetchAnimeImage(query, malId, imgEl, placeholder) {
  try {
    // Try by MAL ID first
    let url = `https://api.jikan.moe/v4/anime/${malId}`;
    let res = await fetch(url);
    let data = await res.json();
    let imgUrl = data?.data?.images?.jpg?.large_image_url || data?.data?.images?.jpg?.image_url;
    if (!imgUrl) throw new Error('no img');
    imgEl.src = imgUrl;
    imgEl.onload = () => {
      imgEl.classList.add('loaded');
      placeholder.style.display = 'none';
      loadedCount++;
      document.getElementById('loadText').textContent = `Loading… ${loadedCount}/100`;
    };
    imgEl.onerror = () => fallbackSearch(query, imgEl, placeholder);
  } catch(e) {
    fallbackSearch(query, imgEl, placeholder);
  }
}

async function fallbackSearch(query, imgEl, placeholder) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=1&sfw`);
    const data = await res.json();
    const item = data?.data?.[0];
    const imgUrl = item?.images?.jpg?.large_image_url || item?.images?.jpg?.image_url;
    if (imgUrl) {
      imgEl.src = imgUrl;
      imgEl.onload = () => {
        imgEl.classList.add('loaded');
        placeholder.style.display = 'none';
        loadedCount++;
        document.getElementById('loadText').textContent = `Loading… ${loadedCount}/100`;
      };
    } else {
      showError(placeholder);
    }
  } catch(e) {
    showError(placeholder);
  }
}

function showError(placeholder) {
  placeholder.innerHTML = '<span class="img-error-icon">🎌</span>';
  loadedCount++;
}

function getRankBadgeClass(i) {
  if (i < 10) return 'card-rank gold';
  if (i < 20) return 'card-rank pink';
  return 'card-rank';
}

function buildGrid() {
  const grid = document.getElementById('animeGrid');
  ANIME_LIST.forEach((anime, i) => {
    const q = FIXED_QUERIES[i]?.q || anime.q;
    const delay = Math.min(i * 40, 800);

    const card = document.createElement('div');
    card.className = 'anime-card';
    card.style.animationDelay = delay + 'ms';
    card.dataset.tags = anime.tags.join(' ');
    card.dataset.title = anime.title.toLowerCase();

    const tagsHtml = anime.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('');
    const badgeClass = getRankBadgeClass(i);

    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="img-placeholder">
          <span class="img-loading-ring"></span>
          <span class="img-placeholder-letter">${anime.title.charAt(0)}</span>
        </div>
        <img alt="${anime.title}" loading="lazy">
      </div>
      <div class="card-rank ${i < 10 ? 'gold' : (i < 20 ? 'pink' : '')}">
        #${String(i+1).padStart(2,'0')}
      </div>
      <div class="card-body">
        <div class="card-title">${anime.title}</div>
        <div class="card-tags">${tagsHtml}</div>
      </div>
    `;

    grid.appendChild(card);

    // Use IntersectionObserver to lazy-load images
    const imgEl = card.querySelector('img');
    const placeholder = card.querySelector('.img-placeholder');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          observer.disconnect();
          enqueue(() => fetchAnimeImage(q, anime.id, imgEl, placeholder));
        }
      });
    }, { rootMargin: '300px' });
    observer.observe(card);
  });
}

// Search & Filter
function updateResults() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
  const cards = document.querySelectorAll('.anime-card');
  let visible = 0;
  cards.forEach(card => {
    const matchSearch = !q || card.dataset.title.includes(q);
    const matchFilter = activeFilter === 'all' || card.dataset.tags.includes(activeFilter);
    if (matchSearch && matchFilter) { card.classList.remove('hidden'); visible++; }
    else card.classList.add('hidden');
  });
  document.getElementById('countDisplay').textContent = visible;
}

document.getElementById('searchInput').addEventListener('input', updateResults);

document.getElementById('filters').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    updateResults();
  }
});

buildGrid();
</script>
